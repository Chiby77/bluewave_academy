# Railway deployment configuration
# https://docs.railway.com/reference/config-as-code

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python manage.py migrate --noinput && gunicorn siteproject.asgi:application -k uvicorn.workers.UvicornWorker --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT --log-level warning --access-logfile - --error-logfile -"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health/"
healthcheckTimeout = 30
