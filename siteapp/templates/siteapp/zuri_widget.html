{% load static %}
<!-- =============================================
     ZURI AI Assistant Widget
     Powered by Groq · llama-3.3-70b-versatile
     Supports: text, images, PDF documents
     Included on: home, about, downloads, blog, contact
============================================= -->
<link rel="stylesheet" href="{% static 'css/zuri.css' %}?v=3">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

{% csrf_token %}

<!-- Floating trigger -->
<button id="zuri-trigger" aria-label="Chat with Zuri AI">
  <i class="fa-solid fa-robot" id="zuri-trigger-icon"></i>
  <span id="zuri-notif"></span>
</button>
<div id="zuri-tooltip">Chat with Zuri &rarr;</div>

<!-- Chat panel -->
<div id="zuri-panel" role="dialog" aria-label="Zuri AI Chat">

  <!-- Header -->
  <div id="zuri-header">
    <div id="zuri-avatar">
      <i class="fa-solid fa-robot"></i>
      <span class="zuri-online-dot"></span>
    </div>
    <div id="zuri-header-info">
      <span id="zuri-header-name">Zuri</span>
      <span id="zuri-header-status">
        Bluewave AI &mdash;
        <span class="groq-pill"><i class="fa-solid fa-bolt" style="font-size:.6rem;"></i> Groq</span>
      </span>
    </div>
    <button id="zuri-close-btn" aria-label="Close chat">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <!-- Messages -->
  <div id="zuri-messages" aria-live="polite"></div>

  <!-- File preview strip -->
  <div id="zuri-file-preview-wrap">
    <!-- Image preview -->
    <div id="zuri-img-row" class="zuri-preview-row" style="display:none;">
      <img id="zuri-img-preview" src="" alt="Attached image">
      <span class="zuri-file-badge img-badge"><i class="fa-solid fa-image"></i> Image</span>
      <span id="zuri-img-name" class="zuri-fname"></span>
      <button class="zuri-remove-btn" id="zuri-img-remove" title="Remove"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <!-- PDF preview -->
    <div id="zuri-pdf-row" class="zuri-preview-row" style="display:none;">
      <div class="zuri-pdf-icon"><i class="fa-solid fa-file-pdf"></i></div>
      <span class="zuri-file-badge pdf-badge"><i class="fa-solid fa-file-pdf"></i> PDF</span>
      <span id="zuri-pdf-name" class="zuri-fname"></span>
      <button class="zuri-remove-btn" id="zuri-pdf-remove" title="Remove"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </div>

  <!-- Footer / input -->
  <div id="zuri-footer">
    <div id="zuri-rate-bar">
      <span class="zuri-rate-label">20 msgs / hour</span>
    </div>
    <div id="zuri-input-row">
      <button id="zuri-attach-btn" class="zuri-action-btn" title="Attach image or PDF" aria-label="Attach file">
        <i class="fa-solid fa-paperclip"></i>
      </button>
      <textarea
        id="zuri-input"
        rows="1"
        placeholder="Ask anything — CS, careers, academy info..."
        aria-label="Message to Zuri"
        maxlength="4000"
      ></textarea>
      <button id="zuri-send-btn" class="zuri-action-btn" title="Send" aria-label="Send message">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
    <div id="zuri-credits">
      Powered by <a href="wwww.bluewavetech.co.zw" target="_blank">Bluewave Technologies Pvt Ltd</a> &amp;
      <span class="groq-badge"><i class="fa-solid fa-bolt" style="font-size:.58rem;"></i> Groq</span>
    </div>
  </div>

</div>

<!-- Hidden file input — accepts images AND PDFs -->
<input type="file" id="zuri-file-input" accept="image/*,application/pdf,.pdf" style="display:none;" aria-hidden="true">
<script src="{% static 'js/zuri.js' %}?v=3"></script>
