# Nixpacks build configuration for Railway
# https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["python312", "uv"]

[phases.install]
cmds = ["uv sync --frozen"]

[phases.build]
cmds = ["uv run python manage.py collectstatic --noinput"]

[start]
cmd = "uv run python manage.py migrate --noinput && uv run gunicorn siteproject.asgi:application -k uvicorn.workers.UvicornWorker --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT --log-level warning --access-logfile - --error-logfile -"
