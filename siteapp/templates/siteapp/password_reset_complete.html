{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset Complete — Bluewave Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; }
    .pw-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
    }
    .pw-card {
      background: #fff; border-radius: 16px;
      padding: 48px 40px; max-width: 440px; width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,.3); text-align: center;
    }
    .pw-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: #d1fae5; color: #059669;
      font-size: 30px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .pw-card h1 { font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 8px; }
    .pw-card > p { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
    .pw-notice {
      background: #d1fae5; border: 1px solid #a7f3d0;
      border-radius: 8px; padding: 16px 20px;
      font-size: 13px; color: #065f46;
      line-height: 1.6; margin-bottom: 28px;
      display: flex; align-items: flex-start; gap: 10px; text-align: left;
    }
    .pw-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700; font-family: 'Poppins', sans-serif;
      cursor: pointer; text-decoration: none;
      transition: background .2s; margin-bottom: 16px;
    }
    .pw-btn:hover { background: #1e40af; }
    .pw-home { font-size: 12px; color: #94a3b8; }
    .pw-home a { color: #2563eb; text-decoration: none; }
    .pw-home a:hover { text-decoration: underline; }
    @media (max-width: 480px) { .pw-card { padding: 32px 20px; } }
  </style>
</head>
<body>
<div class="pw-page">
  <div class="pw-card">
    <div class="pw-icon">
      <i class="fa-solid fa-circle-check"></i>
    </div>
    <h1>Password Reset Successful</h1>
    <p>Your password has been changed and your account is secure.</p>

    <div class="pw-notice">
      <i class="fa-solid fa-shield-halved" style="flex-shrink:0;margin-top:2px;"></i>
      <span>Your password has been successfully reset. You can now sign in with your new password.</span>
    </div>

    <a href="{% url 'siteapp:login' %}" class="pw-btn">
      <i class="fa-solid fa-arrow-right-to-bracket"></i> Return to Login
    </a>
    <div class="pw-home">
      <a href="{% url 'siteapp:home' %}"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </div>
  </div>
</div>
</body>
</html>
